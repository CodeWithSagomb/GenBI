# Patterns de détection des questions composées → sous-questions prédéfinies.
# Ajouter un nouveau pattern = ajouter une entrée ici — zéro modification Python.
# pattern = regex Python (re.IGNORECASE appliqué).
# sub_questions = liste de sous-questions exécutées séquentiellement.

patterns:

  - name: analyse_complete
    pattern: 'analyse compl[eè]te|tableau de bord|bilan complet|r[eé]sum[eé] complet|vue d.ensemble|[eé]tat g[eé]n[eé]ral|full analysis|complete analysis|complete overview|overall summary|dashboard overview|general overview|complete report'
    sub_questions:
      - "quel est le CA total ?"
      - "quel est le CA par mois ?"
      - "combien de produits sont sous le seuil de sécurité ?"
      - "combien de ruptures de stock ?"
      - "combien de lots expirent dans moins de 30 jours ?"

  - name: etat_stocks
    pattern: '[eé]tat des stocks|analyse des stocks|stocks? complet|stock status|stock analysis|inventory analysis|complete inventory'
    sub_questions:
      - "combien de produits sont sous le seuil de sécurité ?"
      - "combien de lots expirent dans moins de 30 jours ?"

  - name: analyse_ruptures
    pattern: 'analyse des ruptures|bilan.{0,10}ruptures|ruptures? complet|stock.?out analysis|stock.?out report|complete stock.?out'
    sub_questions:
      - "combien de ruptures de stock ?"
      - "quels sont les 5 produits avec le plus de ruptures ?"
      - "combien de ruptures par mois ?"

  - name: priorites_commande
    pattern: 'priorit[eé]s?.{0,20}commander|commander.{0,20}priorit[eé]|quoi commander|que commander|produits?.{0,15}commander|what to order|products? to order|order priorit|what should.{0,10}order'
    sub_questions:
      - "quels produits sont sous le seuil de sécurité ?"
      - "quels sont les 5 produits avec le plus de ruptures ?"

  - name: ca_et_stocks
    pattern: '(total.{0,20}(sales|revenue|ca)|ca\s+total|chiffre.{0,10}affaires).{0,60}\band\b.{0,60}(out.of.stock|below.{0,20}(threshold|seuil)|how many.{0,20}(products?|lots?)|stockout|rupture|expir|péremption)'
    sub_questions:
      - "What is my total revenue?"
      - "How many products are below the reorder threshold?"

  - name: ca_et_peremptions
    pattern: '(total.{0,20}(sales|revenue|ca)|ca\s+total).{0,60}\band\b.{0,60}(expir|lots?.{0,15}(expire|périm)|péremption|how many.{0,15}lots?)'
    sub_questions:
      - "What is my total revenue?"
      - "Which lots expire within the next 30 days?"
